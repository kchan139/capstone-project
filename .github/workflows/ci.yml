name: CI

on:
    push:
        branches: ["main"]
        paths:
            - "container-runtime/**"
            - ".github/**"
            - "copy-file.sh"
            - "port-forward.sh"
            - "release.sh"
            - ".env.example"
    pull_request:
        branches: ["main"]
        paths:
            - "container-runtime/**"
            - ".github/**"
            - "copy-file.sh"
            - "port-forward.sh"
            - "release.sh"
            - ".env.example"
    workflow_dispatch:
        inputs:
            run-privileged:
                description: "Run privileged runtime smoke test (downloads rootfs and requires sudo)"
                required: false
                type: boolean
                default: false

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    preflight:
        name: Preflight
        runs-on: ubuntu-24.04
        timeout-minutes: 5
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Validate repository layout
              run: ./.github/scripts/preflight.sh

    quality-gates:
        name: Quality gates
        runs-on: ubuntu-24.04
        needs: preflight
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Go from go.mod
              uses: actions/setup-go@v6
              with:
                  go-version-file: container-runtime/go.mod
                  cache: true
                  cache-dependency-path: container-runtime/go.sum

            - name: Lint GitHub Actions workflows
              uses: rhysd/actionlint@main

            - name: Install shellcheck
              run: sudo apt-get update && sudo apt-get install -y shellcheck

            - name: Lint shell scripts
              run: |
                  shellcheck \
                    copy-file.sh \
                    port-forward.sh \
                    release.sh \
                    container-runtime/configs/firewall-setup.sh \
                    .github/scripts/*.sh

            - name: Enforce gofmt
              working-directory: container-runtime
              run: |
                  unformatted="$(find . -type f -name '*.go' -not -path './vendor/*' -print0 | xargs -0 gofmt -l)"
                  if [[ -n "$unformatted" ]]; then
                    echo "The following Go files are not gofmt-formatted:"
                    echo "$unformatted"
                    exit 1
                  fi

    dependency-hygiene:
        name: Dependency hygiene
        runs-on: ubuntu-24.04
        needs: preflight
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Go from go.mod
              uses: actions/setup-go@v6
              with:
                  go-version-file: container-runtime/go.mod
                  cache: true
                  cache-dependency-path: container-runtime/go.sum

            - name: Install native build dependencies
              run: sudo apt-get update && sudo apt-get install -y libseccomp-dev

            - name: Verify Go module state
              working-directory: container-runtime
              run: |
                  go mod download
                  go mod verify
                  go mod tidy
                  git diff --exit-code -- go.mod go.sum

    static-analysis:
        name: Static analysis
        runs-on: ubuntu-24.04
        needs: [quality-gates, dependency-hygiene]
        timeout-minutes: 20
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Go from go.mod
              uses: actions/setup-go@v6
              with:
                  go-version-file: container-runtime/go.mod
                  cache: true
                  cache-dependency-path: container-runtime/go.sum

            - name: Install native build dependencies
              run: sudo apt-get update && sudo apt-get install -y libseccomp-dev

            - name: Run go vet
              working-directory: container-runtime
              run: go vet ./...

            - name: Install staticcheck
              run: go install honnef.co/go/tools/cmd/staticcheck@v0.6.1

            - name: Run staticcheck
              working-directory: container-runtime
              run: staticcheck ./...

    test-and-build:
        name: Test and build
        runs-on: ubuntu-24.04
        needs: [quality-gates, dependency-hygiene]
        timeout-minutes: 20
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Go from go.mod
              uses: actions/setup-go@v6
              with:
                  go-version-file: container-runtime/go.mod
                  cache: true
                  cache-dependency-path: container-runtime/go.sum

            - name: Install native build dependencies
              run: sudo apt-get update && sudo apt-get install -y libseccomp-dev

            - name: Run unit tests
              working-directory: container-runtime
              run: go test ./...

            - name: Run integration-tag smoke tests
              working-directory: container-runtime
              run: go test -tags=integration ./tests/...

            - name: Build mrunc
              working-directory: container-runtime
              run: make build

            - name: Verify mrunc version output
              working-directory: container-runtime
              run: |
                  ./bin/mrunc version 2>&1 | tee version.txt
                  grep -q "mrunc version" version.txt

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: mrunc-linux-amd64
                  path: |
                      container-runtime/bin/mrunc
                      container-runtime/version.txt
                  if-no-files-found: error

    security:
        name: Security scan
        runs-on: ubuntu-24.04
        needs: test-and-build
        timeout-minutes: 20
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Go from go.mod
              uses: actions/setup-go@v6
              with:
                  go-version-file: container-runtime/go.mod
                  cache: true
                  cache-dependency-path: container-runtime/go.sum

            - name: Install native build dependencies
              run: sudo apt-get update && sudo apt-get install -y libseccomp-dev

            - name: Install govulncheck
              run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

            - name: Run govulncheck
              working-directory: container-runtime
              run: govulncheck ./...

            - name: Scan repository with Trivy
              uses: aquasecurity/trivy-action@v0.35.0
              with:
                  scan-type: fs
                  scan-ref: ./container-runtime
                  severity: HIGH,CRITICAL
                  ignore-unfixed: true
                  exit-code: "1"
                  format: table

    runtime-smoke:
        name: Runtime smoke (manual)
        runs-on: ubuntu-24.04
        needs: test-and-build
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run-privileged }}
        timeout-minutes: 30
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Go from go.mod
              uses: actions/setup-go@v6
              with:
                  go-version-file: container-runtime/go.mod
                  cache: true
                  cache-dependency-path: container-runtime/go.sum

            - name: Install native build and runtime dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libseccomp-dev iproute2 iptables tar

            - name: Run privileged runtime smoke test
              run: ./.github/scripts/privileged-smoke.sh
